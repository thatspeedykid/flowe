org.gradle.jvmargs=-Xmx4G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true

# Disable Kotlin incremental compilation.
# Flutter projects often have Pub cache on a different drive (C:\Users\...)
# than the project directory (D:\...). Kotlin's incremental compiler cannot
# relativize paths across Windows drive roots and throws:
#   "this and base files have different roots"
# This flag eliminates that class of error with no impact on release output.
kotlin.incremental=false

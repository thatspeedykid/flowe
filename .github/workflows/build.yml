name: Build & Sign All Platforms

# ── Trigger ────────────────────────────────────────────────────────────────────
# Manually triggered only — used for v1.7.0 test build.
# To run: GitHub repo → Actions tab → "Build & Sign All Platforms" → Run workflow
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.7.0)'
        required: true
        default: '1.7.0'

env:
  FLUTTER_VERSION: '3.29.0'
  VERSION: ${{ github.event.inputs.version }}

jobs:

  # ── Android APK ─────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Signing setup ─────────────────────────────────────────────────────
      # Requires these GitHub Secrets (Settings → Secrets → Actions):
      #   ANDROID_KEYSTORE_BASE64  — base64-encoded .jks keystore file
      #   ANDROID_KEY_ALIAS        — key alias used when generating the keystore
      #   ANDROID_KEY_PASSWORD     — key password
      #   ANDROID_STORE_PASSWORD   — store password
      #
      # To generate a keystore (run once on your machine):
      #   keytool -genkey -v -keystore flowe.jks -alias flowe \
      #     -keyalg RSA -keysize 2048 -validity 10000
      #   base64 -w 0 flowe.jks > flowe.jks.b64
      # Then paste the contents of flowe.jks.b64 as the ANDROID_KEYSTORE_BASE64 secret.
      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/flowe.jks

      - name: Write key.properties
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=flowe.jks
          EOF

      - name: Build APK (signed if secrets present, unsigned otherwise)
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk flowe_${{ env.VERSION }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flowe_${{ env.VERSION }}.apk
          retention-days: 7

  # ── Windows EXE ─────────────────────────────────────────────────────────────
  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Runner.rc metadata
        run: python patch_rc.py

      - name: Build Windows
        run: flutter build windows --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        run: |
          & "C:\Program Files (x86)\NSIS\Bin\makensis.exe" flowe_setup.nsi

      # ── Windows code signing (optional) ───────────────────────────────────
      # Requires these GitHub Secrets:
      #   WINDOWS_CERT_BASE64   — base64-encoded .pfx certificate file
      #   WINDOWS_CERT_PASSWORD — certificate password
      #
      # Uncomment this step once you have a certificate:
      # - name: Sign EXE
      #   if: ${{ secrets.WINDOWS_CERT_BASE64 != '' }}
      #   run: |
      #     echo "${{ secrets.WINDOWS_CERT_BASE64 }}" | base64 --decode > cert.pfx
      #     & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign `
      #       /f cert.pfx /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" `
      #       /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
      #       "installers\flowe_${{ env.VERSION }}_setup.exe"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: installers/flowe_${{ env.VERSION }}_setup.exe
          retention-days: 7

  # ── Linux DEB ────────────────────────────────────────────────────────────────
  linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev lld binutils

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package DEB
        run: bash build_deb_wsl.sh

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: installers/flowe_${{ env.VERSION }}_amd64.deb
          retention-days: 7

  # ── macOS DMG + iOS IPA ─────────────────────────────────────────────────────
  macos:
    name: macOS DMG + iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install dependencies
        run: flutter pub get

      # ── Apple signing setup ───────────────────────────────────────────────
      # Requires these GitHub Secrets (Settings → Secrets → Actions):
      #
      #   IOS_DISTRIBUTION_CERT_BASE64     — base64-encoded .p12 distribution certificate
      #   IOS_DISTRIBUTION_CERT_PASSWORD   — .p12 password
      #   IOS_PROVISIONING_PROFILE_BASE64  — base64-encoded .mobileprovision file
      #   MACOS_DISTRIBUTION_CERT_BASE64   — base64-encoded .p12 for macOS
      #   MACOS_DISTRIBUTION_CERT_PASSWORD — .p12 password
      #   MACOS_PROVISIONING_PROFILE_BASE64 — base64-encoded macOS .provisionprofile
      #   APPLE_TEAM_ID                    — your 10-character Apple Team ID
      #
      # How to get these:
      #   1. Go to developer.apple.com → Certificates, IDs & Profiles
      #   2. Create an "Apple Distribution" certificate, download it
      #   3. Double-click to import into Keychain, then export as .p12 with a password
      #   4. base64 -i cert.p12 | pbcopy  → paste as the secret
      #   5. Create an App Store provisioning profile for com.privacychase.flowe
      #   6. Download the .mobileprovision, then: base64 -i file.mobileprovision | pbcopy
      - name: Install Apple certificates and provisioning profiles
        if: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 != '' }}
        env:
          IOS_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_CERT_BASE64: ${{ secrets.MACOS_DISTRIBUTION_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_DISTRIBUTION_CERT_PASSWORD }}
          MACOS_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import iOS certificate
          echo "$IOS_CERT_BASE64" | base64 --decode > ios_dist.p12
          security import ios_dist.p12 -k build.keychain \
            -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm ios_dist.p12

          # Import macOS certificate
          echo "$MACOS_CERT_BASE64" | base64 --decode > macos_dist.p12
          security import macos_dist.p12 -k build.keychain \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm macos_dist.p12

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Install iOS provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/flowe_ios.mobileprovision

          # Install macOS provisioning profile
          echo "$MACOS_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/flowe_macos.provisionprofile

      - name: Build macOS + iOS
        run: bash build_all_mac.sh
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ~/Documents/flowe-builds/flowe_${{ env.VERSION }}.dmg
          retention-days: 7

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ~/Documents/flowe-builds/flowe_${{ env.VERSION }}.ipa
          retention-days: 7

  # ── Collect all artifacts into one summary ──────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [android, windows, linux, macos]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: List outputs
        run: |
          echo "=== Build complete ==="
          find all-artifacts/ -type f | sort

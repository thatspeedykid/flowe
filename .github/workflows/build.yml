name: Build & Sign All Platforms

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.7.5)'
        required: true
        default: '1.7.5'

env:
  FLUTTER_VERSION: '3.41.4'
  VERSION: ${{ github.event.inputs.version }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Restore MainActivity.kt
        run: git checkout android/app/src/main/kotlin/com/privacychase/flowe/MainActivity.kt

      - name: Inject icons
        run: bash inject_icons.sh

      - name: Generate splash
        run: dart run flutter_native_splash:create

      - name: Fix Android v2 embedding
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<meta-data.*flutterEmbedding.*value="1"/d' "$MANIFEST"
          echo "AndroidManifest checked"

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/flowe.jks
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=flowe.jks\n" \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
            echo "Signing enabled"
          else
            echo "No keystore — unsigned build"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk flowe_${{ env.VERSION }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flowe_${{ env.VERSION }}.apk
          retention-days: 7

  windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Windows platform files
        run: flutter create --platforms=windows .

      - name: Inject icons
        run: |
          copy assets\app_icon.ico windows\runner\resources\app_icon.ico
          bash inject_icons.sh

      - name: Patch Runner.rc
        run: python patch_rc.py

      - name: Build Windows
        run: flutter build windows --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create installers directory
        run: mkdir -p installers

      - name: Build installer
        run: '& "C:\Program Files (x86)\NSIS\Bin\makensis.exe" flowe_setup.nsi'

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: installers/flowe_${{ env.VERSION }}_setup.exe
          retention-days: 7

  linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev lld binutils

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Linux platform files
        run: flutter create --platforms=linux .

      - name: Inject icons
        run: bash inject_icons.sh

      - name: Build Linux
        run: flutter build linux --release

      - name: Package DEB
        run: bash build_deb_wsl.sh

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: installers/flowe_${{ env.VERSION }}_amd64.deb
          retention-days: 7

  macos:
    name: macOS DMG + iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install dependencies
        run: flutter pub get

      - name: Generate macOS and iOS platform files
        run: flutter create --platforms=macos,ios .

      - name: Inject icons
        run: bash inject_icons.sh

      - name: Generate splash
        run: dart run flutter_native_splash:create

      - name: Install Apple certificates
        env:
          IOS_CERT: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PWD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_CERT: ${{ secrets.MACOS_DISTRIBUTION_CERT_BASE64 }}
          MACOS_CERT_PWD: ${{ secrets.MACOS_DISTRIBUTION_CERT_PASSWORD }}
          MACOS_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$IOS_CERT" ]; then
            KP=$(openssl rand -base64 32)
            security create-keychain -p "$KP" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KP" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            echo "$IOS_CERT" | base64 --decode > ios.p12
            security import ios.p12 -k build.keychain -P "$IOS_CERT_PWD" -T /usr/bin/codesign
            rm ios.p12
            echo "$MACOS_CERT" | base64 --decode > macos.p12
            security import macos.p12 -k build.keychain -P "$MACOS_CERT_PWD" -T /usr/bin/codesign
            rm macos.p12
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" build.keychain
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$IOS_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/flowe_ios.mobileprovision
            echo "$MACOS_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/flowe_macos.provisionprofile
            echo "Certificates installed"
          else
            echo "No Apple certs — unsigned build"
          fi

      - name: Build macOS + iOS
        run: bash build_all_mac.sh
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ~/Documents/flowe-builds/flowe_${{ env.VERSION }}.dmg
          retention-days: 7

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ~/Documents/flowe-builds/flowe_${{ env.VERSION }}.ipa
          retention-days: 7

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [android, windows, linux, macos]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
      - name: List outputs
        run: find all-artifacts/ -type f | sort
